spring.application.name=fitness

# MySQL 연결 설정
spring.datasource.url=jdbc:mysql://localhost:3306/fitness_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=0000
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA 설정 (💡 데이터를 확실하게 새로 넣기 위해 잠시 create로 변경합니다)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 💡 대량 데이터 저장 속도를 획기적으로 올리기 위한 배치 설정
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true

# Google Gemini API 키 설정 (환경변수 설정 필요)
spring.ai.google.genai.api-key=${GOOGLE_API_KEY:dummy-key}