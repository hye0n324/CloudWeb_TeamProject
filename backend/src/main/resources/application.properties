spring.application.name=fitness
# MySQL 연결 설정
spring.datasource.url=jdbc:mysql://localhost:3306/fitness_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=0000
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA 설정 (테이블 자동 생성 등)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Google Gemini API 키 설정 (더미 값)
spring.ai.google.genai.api-key=${GOOGLE_API_KEY:dummy-key}
